name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        shell: bash
        run: |
          uv run pytest \
            --cov=pyplyne \
            --cov-report=term-missing \
            --cov-report=markdown-append:"$GITHUB_STEP_SUMMARY" \
            --cov-report=markdown:coverage-summary.md

      - name: Comment coverage summary
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          rows = []
          total = None
          for line in Path("coverage-summary.md").read_text(encoding="utf-8").splitlines():
              if not line.startswith("|"):
                  continue
              cells = [cell.strip() for cell in line.strip("|").split("|")]
              if len(cells) < 6 or cells[0] in {"Name", "---------------------------"}:
                  continue

              name = cells[0].removeprefix("**").removesuffix("**")
              cover_text = cells[5].removeprefix("**").removesuffix("**")
              match = re.fullmatch(r"(\d+)%", cover_text)
              if match is None:
                  continue

              coverage = int(match.group(1))
              if name == "TOTAL":
                  total = coverage
              else:
                  rows.append((coverage, name))

          lowest = sorted(rows)[:3]
          lines = [
              "<!-- pyplyne-coverage-summary -->",
              "## Coverage summary",
              "",
              f"Total coverage: **{total}%**",
              "",
              "Branch coverage is enabled. Full per-file details are in the "
              "`Python / ubuntu-latest` job summary.",
          ]
          if lowest:
              lines.extend(["", "Lowest files:"])
              lines.extend(f"- `{name}` - {coverage}%" for coverage, name in lowest)

          Path("coverage-comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file coverage-comment.md \
            --edit-last \
            --create-if-none

      - name: Build package
        run: uv build

      - name: Smoke test built distributions
        shell: bash
        run: |
          set -euo pipefail
          for artifact in dist/*.whl dist/*.tar.gz; do
            uv run --isolated --no-project --with "$artifact" python -c "import importlib.metadata as m; import pyplyne; print(m.version('pyplyne')); assert pyplyne.run('numbers = seq [1, 2, 3]\nnumbers |> map(_ * 2)\n').result == [2, 4, 6]"
          done

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --locked --extra dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build docs site
        run: npm run build
        working-directory: site
