name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        shell: bash
        run: |
          uv run pytest \
            --cov=pyplyne \
            --cov-report=term-missing \
            --cov-report=markdown-append:"$GITHUB_STEP_SUMMARY" \
            --cov-report=markdown:coverage-summary.md

      - name: Comment coverage summary
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "<!-- pyplyne-coverage-summary -->"
            echo "## Coverage summary"
            echo
            echo "Generated from \`Python / ubuntu-latest\`."
            echo
            cat coverage-summary.md
          } > coverage-comment.md

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          marker = "<!-- pyplyne-coverage-summary -->"
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          body = Path("coverage-comment.md").read_text(encoding="utf-8")
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          comments_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          comments_request = Request(comments_url, headers=headers)
          comments = json.loads(urlopen(comments_request).read().decode("utf-8"))
          comment_id = next(
              (
                  comment["id"]
                  for comment in comments
                  if comment["user"]["login"] == "github-actions[bot]"
                  and marker in comment["body"]
              ),
              None,
          )

          payload = json.dumps({"body": body}).encode("utf-8")
          if comment_id is None:
              request = Request(
                  comments_url,
                  data=payload,
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
          else:
              request = Request(
                  f"https://api.github.com/repos/{repo}/issues/comments/{comment_id}",
                  data=payload,
                  headers={**headers, "Content-Type": "application/json"},
                  method="PATCH",
              )
          urlopen(request).read()
          PY

      - name: Build package
        run: uv build

      - name: Smoke test built distributions
        shell: bash
        run: |
          set -euo pipefail
          for artifact in dist/*.whl dist/*.tar.gz; do
            uv run --isolated --no-project --with "$artifact" python -c "import importlib.metadata as m; import pyplyne; print(m.version('pyplyne')); assert pyplyne.run('numbers = seq [1, 2, 3]\nnumbers |> map(_ * 2)\n').result == [2, 4, 6]"
          done

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --locked --extra dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build docs site
        run: npm run build
        working-directory: site
